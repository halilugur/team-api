name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release TeamAPI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # don't cancel other OS builds if one fails
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # ── Per-OS build steps (avoids bash conditional issues on Windows) ──

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac dmg

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis msi zip

      # ── Debug: print what was actually produced ──
      - name: List dist/ contents
        run: ls -R dist/
        shell: bash

      - name: Upload Artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}