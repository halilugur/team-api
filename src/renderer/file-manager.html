<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>TeamFolder</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Apply stored/system theme before first paint to avoid a theme flash.
       CSP is script-src 'self', so this is an external file, not inline. -->
  <script src="theme-init.js"></script>
</head>

<body class="fm-body">

  <!-- Custom Drag Titlebar -->
  <header class="custom-titlebar">
    <div class="titlebar-drag-region"></div>
    <div class="titlebar-content">
      <svg class="titlebar-icon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"
        style="color: var(--accent-blue);">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
      </svg>
      <span class="titlebar-workspace-name" id="fmTitle">TeamFolder</span>
      <div class="titlebar-actions">
        <button class="titlebar-toggle-btn" id="fmRefresh" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Toast Notification Area -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- No-workspace fallback -->
  <div id="fmNoWorkspace" class="fm-empty" style="display: none;">
    <p>No workspace is open. Open a workspace in the main window first.</p>
  </div>

  <!-- Main layout -->
  <div id="fmApp" class="fm-app" style="display: none;">
    <!-- Toolbar -->
    <div class="fm-toolbar">
      <button class="fm-btn" id="fmNewFile" title="New File">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <span>New File</span>
      </button>
      <button class="fm-btn" id="fmNewFolder" title="New Folder">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          <line x1="12" y1="11" x2="12" y2="17"></line>
          <line x1="9" y1="14" x2="15" y2="14"></line>
        </svg>
        <span>New Folder</span>
      </button>
      <button class="fm-btn" id="fmRename" title="Rename" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Rename</span>
      </button>
      <button class="fm-btn fm-btn-danger" id="fmDelete" title="Delete" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span>Delete</span>
      </button>
      <div class="fm-breadcrumb" id="fmBreadcrumb"></div>
    </div>

    <!-- Split body: tree + editor -->
    <div class="fm-split">
      <div class="fm-tree-pane">
        <div id="fmTree" class="fm-tree"></div>
      </div>
      <div class="fm-editor-pane">
        <div class="fm-editor-header">
          <span class="fm-editor-path" id="fmEditorPath">Select a file to view or edit</span>
          <button class="fm-btn fm-btn-sm" id="fmOpenExternal" title="Open in system app" disabled>Open</button>
          <button class="fm-btn fm-btn-sm" id="fmReveal" title="Reveal in Finder / Explorer" disabled>Reveal</button>
          <button class="fm-btn fm-btn-sm fm-btn-primary" id="fmSave" title="Save (Ctrl/Cmd+S)" disabled>Save</button>
        </div>
        <textarea class="fm-editor" id="fmEditor" spellcheck="false" placeholder="Select a text file to edit…"
          disabled></textarea>
        <div class="fm-editor-footer" id="fmEditorFooter"></div>
      </div>
    </div>
  </div>

  <script src="file-manager.js"></script>
</body>

</html>
